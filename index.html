<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificación del sistema</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #050505;
      color: #00ff55;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 25px;
    }
    .contenedor { width: 100%; max-width: 500px; }
    .alerta {
      color: red;
      font-size: 30px;
      animation: parpadear 0.7s infinite;
    }
    .mensaje { font-size: 20px; line-height: 1.5; }
    .barra {
      width: 100%;
      height: 22px;
      border: 2px solid #00ff55;
      margin-top: 25px;
      overflow: hidden;
    }
    .progreso {
      height: 100%;
      width: 0%;
      background: #00ff55;
      transition: width 0.3s;
    }
    #broma {
      display: none;
      color: white;
      font-family: Arial, sans-serif;
    }
    @keyframes parpadear { 50% { opacity: 0.2; } }
  </style>
</head>
<body>
  <div class="contenedor" id="pantalla">
    <h1 class="alerta">⚠ ALERTA DEL SISTEMA ⚠</h1>
    <p class="mensaje" id="texto">Analizando dispositivo...</p>
    <div class="barra">
      <div class="progreso" id="progreso"></div>

  <script>
    const texto = document.getElementById("texto");
    const progreso = document.getElementById("progreso");
    const mensajes = [
      "Analizando dispositivo...",
      "Comprobando seguridad...",
      "Acceso detectado...",
      "Tu sistema ha sido vulnerado...",
      "Finalizando proceso..."
    ];

    let porcentaje = 0;
    let mensajeActual = 0;

    const intervalo = setInterval(() => {
      porcentaje += 10;
      progreso.style.width = porcentaje + "%";

      if (porcentaje % 20 === 0 && mensajeActual < mensajes.length) {
        texto.textContent = mensajes[mensajeActual];
        mensajeActual++;
      }

      if (porcentaje >= 100) {
        clearInterval(intervalo);
        setTimeout(() => {
          document.getElementById("pantalla").style.display = "none";
          document.getElementById("broma").style.display = "block";
        }, 1200);
      }
    }, 400);
  </script>
</body>
</html>
